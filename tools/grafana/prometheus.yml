global:
  scrape_interval: 10s
scrape_configs:
  - job_name: gpu_energy_optimizer
    static_configs:
      - targets: ['ai-gpu-brain-v3.onrender.com']
    scheme: https
    metrics_path: /metrics
  - job_name: gpu_agent_local
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics
    scrape_interval: 5s
