version: '3.8'

services:
  api:
    build: ./ai-engine
    ports:
      - "8000:8000"
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me}
      - DATA_DIR=/data
    volumes:
      - gpu_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  gpu_data:
