apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: powercaps.energy.gpu-optimizer.io
spec:
  group: energy.gpu-optimizer.io
  names:
    kind: PowerCap
    plural: powercaps
    singular: powercap
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              gpu_id:
                type: integer
              power_limit_watts:
                type: integer
                minimum: 100
                maximum: 700
              workload_type:
                type: string
                enum: ["training", "inference"]
